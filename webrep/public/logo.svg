  <!-- Top arc -->
  <path d="M9.5 11.5 Q16 13.5 22.5 11.5" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Bottom arc -->
  <path d="M9.5 20.5 Q16 18.5 22.5 20.5" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- AI spark dot top-right -->
